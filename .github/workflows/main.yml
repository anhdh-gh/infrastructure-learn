name: CI

on:
  push:
    branches:
      - java-springboot-service

env:
  IMAGE_NAME: java-springboot-service

jobs:
  build:
    name: Build and maybe push Docker image
    runs-on: ubuntu-latest
    steps:

      - name: Checkout release-on-premise
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Provide permission to run mvnw
        run: chmod +x ./mvnw

      - name: Build the app
        run: |
          mvn clean
          mvn -B package --file pom.xml

      # Login Docker
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Build image
      - name: Build and push Docker image
        id: spring-boot-docker_build
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}