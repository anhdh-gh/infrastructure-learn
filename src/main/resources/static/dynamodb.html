<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynamoDB Manager</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --text-color: #111827;
            --card-bg: #FFFFFF;
            --border-color: #E5E7EB;
            --danger: #EF4444;
            --danger-hover: #DC2626;
            --success: #10B981;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-color);
            text-align: center;
            background: linear-gradient(90deg, var(--primary), #EC4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #374151;
        }

        input[type="text"],
        input[type="email"],
        input[type="hidden"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .btn-danger:hover {
            background-color: var(--danger-hover);
        }

        .btn-edit {
            background-color: #F3F4F6;
            color: #374151;
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .btn-edit:hover {
            background-color: #E5E7EB;
        }

        .btn-cancel {
            background-color: #F3F4F6;
            color: #374151;
        }

        .btn-cancel:hover {
            background-color: #E5E7EB;
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-row:hover {
            background-color: #F9FAFB;
        }

        .item-info h3 {
            margin: 0 0 4px 0;
            font-size: 1.1rem;
        }

        .item-info p {
            margin: 0;
            color: #6B7280;
            font-size: 0.9rem;
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        .notification {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            background-color: var(--success);
            color: white;
            font-weight: 500;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        [v-cloak] {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>DynamoDB Manager</h1>

        <div id="notification" class="notification"></div>

        <div class="card">
            <h2 style="margin-top: 0;" id="formTitle">Create New User</h2>
            <form id="userForm">
                <input type="hidden" id="userId">

                <div class="form-group">
                    <label for="userName">Name</label>
                    <input type="text" id="userName" placeholder="E.g. John Doe" required>
                </div>

                <div class="form-group">
                    <label for="userEmail">Email</label>
                    <input type="email" id="userEmail" placeholder="john@example.com" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary" id="saveBtn">Save User</button>
                    <button type="button" class="btn-cancel" id="cancelBtn" style="display:none;"
                        onclick="resetForm()">Cancel</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2 style="margin-top: 0;">Users List</h2>
            <ul class="item-list" id="userList">
                <!-- Users injected here by JS -->
            </ul>
            <div id="emptyState" style="text-align: center; color: #6B7280; padding: 20px; display: none;">
                No users found. Create one above!
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/dynamodb';
        const form = document.getElementById('userForm');
        const userList = document.getElementById('userList');
        const emptyState = document.getElementById('emptyState');
        const formTitle = document.getElementById('formTitle');
        const cancelBtn = document.getElementById('cancelBtn');

        // Notification system
        function showNotification(message, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.backgroundColor = isError ? 'var(--danger)' : 'var(--success)';
            notif.style.display = 'block';

            // Trigger reflow
            void notif.offsetWidth;
            notif.style.opacity = '1';

            setTimeout(() => {
                notif.style.opacity = '0';
                setTimeout(() => { notif.style.display = 'none'; }, 300);
            }, 3000);
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to fetch users');

                const users = await response.json();
                renderUsers(users);
            } catch (error) {
                console.error('Error fetching users:', error);
                showNotification('Failed to load users.', true);
            }
        }

        // Render users
        function renderUsers(users) {
            userList.innerHTML = '';

            if (users.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            users.forEach(user => {
                const li = document.createElement('li');
                li.className = 'item-row';
                li.innerHTML = `
                <div class="item-info">
                    <h3>${escapeHtml(user.name)}</h3>
                    <p>${escapeHtml(user.email)}</p>
                    <p style="font-size: 0.75rem; color: #9CA3AF; margin-top: 4px;">ID: ${user.userId}</p>
                </div>
                <div class="item-actions">
                    <button class="btn-edit" onclick="editUser('${user.userId}', '${escapeHtml(user.name).replace(/'/g, "\\'")}', '${escapeHtml(user.email).replace(/'/g, "\\'")}')">Edit</button>
                    <button class="btn-danger" onclick="deleteUser('${user.userId}')">Delete</button>
                </div>
            `;
                userList.appendChild(li);
            });
        }

        // Save user (Create or Update)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const userId = document.getElementById('userId').value;
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;

            const userData = { name, email };

            try {
                let response;
                if (userId) {
                    // Update
                    userData.userId = userId;
                    response = await fetch(`${API_URL}/${userId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                } else {
                    // Create
                    response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                }

                if (!response.ok) throw new Error('Failed to save user');

                showNotification(userId ? 'User updated successfully!' : 'User created successfully!');
                resetForm();
                loadUsers();
            } catch (error) {
                console.error('Error saving user:', error);
                showNotification('Failed to save user.', true);
            }
        });

        // Edit user (populate form)
        function editUser(id, name, email) {
            document.getElementById('userId').value = id;
            document.getElementById('userName').value = name;
            document.getElementById('userEmail').value = email;

            formTitle.textContent = 'Edit User';
            cancelBtn.style.display = 'inline-flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Delete user
        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Failed to delete user');

                showNotification('User deleted successfully!');
                loadUsers();
            } catch (error) {
                console.error('Error deleting user:', error);
                showNotification('Failed to delete user.', true);
            }
        }

        // Reset form
        function resetForm() {
            form.reset();
            document.getElementById('userId').value = '';
            formTitle.textContent = 'Create New User';
            cancelBtn.style.display = 'none';
        }

        // Basic HTML escaping
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Initial load
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>

</body>

</html>
